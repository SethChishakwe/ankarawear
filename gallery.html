    <style>
        .gallery-container { padding: 4rem 5%; }
        .gallery-title { text-align: center; font-family: var(--font-heading); font-size: 3rem; margin-bottom: 3rem; }
        
        .masonry-layout {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }
        .masonry-item { overflow: hidden; }
        .masonry-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .masonry-item:hover img { transform: scale(1.05); }
        .masonry-item.large { grid-column: span 2; height: 600px; }
        
        @media (max-width: 768px) {
            .masonry-layout { grid-template-columns: 1fr; }
            .masonry-item.large { grid-column: span 1; height: auto; }
        }
    </style>
</head>
